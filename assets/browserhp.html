<!DOCTYPE html>
<html>
  <head>
    <title>New Tab</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <meta
      name="description"
      content="Pluto is a minimal but functional 'web OS'
    that aims to provide a desktop environment-like experience inside of a
    website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta name="darkreader-lock" />
    <link href="/style.css" rel="stylesheet" type="text/css" />
    <meta name="color-scheme" content="light dark" />
    <style>
      /* Base styles */
      html,
      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans",
          "Helvetica Neue", sans-serif;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        color: white;
        background-color: #111; /* Fallback background */
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-image: var(--bg-image); /* Controlled by JS */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      body.loaded::before {
        opacity: 1;
      }

      /* Main container with backdrop for readability */
      .container {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-sizing: border-box;
      }

      /* Clock styles */
      .clock {
        font-size: 6rem;
        font-weight: 600;
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      /* Search container and form */
      .search-container {
        text-align: center;
        margin-top: 20px;
      }

      .search-container form {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: rgba(40, 40, 40, 0.6);
        padding: 8px;
        border-radius: 30px;
        border: 1px solid hsl(222, 23%, 22%);
        transition: background-color 0.2s;
      }

      .search-container form:focus-within {
        background: rgba(50, 50, 50, 0.8);
      }

      .search-input {
        width: 450px;
        font-family: inherit;
        border: none;
        background-color: transparent;
        color: white;
        padding: 8px 12px;
        font-size: 16px;
        outline: none;
      }

      .search-button {
        font-family: inherit;
        color: #fff;
        border: none;
        padding: 8px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 20px;
        background-color: hsl(222, 26%, 18%);
        border: 1px solid hsl(222, 23%, 22%);
        transition: background-color 0.2s;
      }

      .search-button:hover {
        background-color: hsl(222, 27%, 20%);
      }

      /* Photo credit styles */
      .photo-credit {
        position: fixed;
        bottom: 10px;
        right: 15px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        text-shadow: 0 0 5px black;
        text-decoration: none;
        display: none; /* Hidden by default */
      }

      .photo-credit a {
        color: rgba(255, 255, 255, 0.9);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="clock" id="clock">12:00</div>
      <div class="search-container">
        <form
          action="https://www.google.com/search"
          method="GET"
          target="_self"
        >
          <input
            type="text"
            name="q"
            class="search-input"
            placeholder="Search with Google"
          />
          <input type="hidden" name="igu" value="1" />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </div>
    </div>

    <div class="photo-credit" id="photo-credit"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Clock
        const clockElement = document.getElementById("clock");

        function updateClock() {
          const now = new Date();
          const hours = String(now.getHours()).padStart(2, "0");
          const minutes = String(now.getMinutes()).padStart(2, "0");
          clockElement.textContent = `${hours}:${minutes}`;
        }

        updateClock();
        setInterval(updateClock, 1000);

        // Background Image & Crediting
        const creditContainer = document.getElementById("photo-credit");

        async function setRandomBackground() {
          try {
            const response = await fetch("https://picsum.photos/1920/1080");
            if (!response.ok) throw new Error("Failed to fetch image");

            const imageId = response.headers.get("picsum-id");
            const finalImageUrl = `https://picsum.photos/id/${imageId}/1920/1080`;

            const img = new Image();
            img.src = finalImageUrl;
            img.onload = () => {
              // Set the CSS variable for the pseudo-element's background
              document.documentElement.style.setProperty(
                "--bg-image",
                `url('${finalImageUrl}')`
              );
              // Trigger transition
              document.body.classList.add("loaded");
            };

            const infoResponse = await fetch(
              `https://picsum.photos/id/${imageId}/info`
            );
            if (!infoResponse.ok) throw new Error("Failed to fetch image info");

            const info = await infoResponse.json();

            creditContainer.innerHTML = `Photo by 
                        <a href="${info.url}" target="_self" rel="noopener noreferrer">${info.author}</a> on 
                        <a href="https://unsplash.com" target="_self" rel="noopener noreferrer">Unsplash</a>`;

            creditContainer.style.display = "block";
          } catch (error) {
            console.error("Error setting background:", error);
            creditContainer.style.display = "none";
          }
        }

        setRandomBackground();
      });
    </script>
  </body>
</html>
